services:
  # ── Ollama: local LLM server ───────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU support (uncomment if EC2 has GPU):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Model pull: run once to download the model ──────────────────────────────
  ollama-pull:
    image: ollama/ollama:latest
    container_name: ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["ollama", "pull", "${OLLAMA_MODEL:-llama3.2}"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

  # ── Voice Agents API ────────────────────────────────────────────────────────
  voice-agents:
    build: .
    container_name: voice-agents
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./models:/app/models        # mount TTS model files
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:
